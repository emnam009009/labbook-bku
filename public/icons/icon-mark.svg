<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Atom orbits (3 ellipses rotated) -->
  <g transform="translate(256, 256)" stroke="white" stroke-width="14" fill="none">
    <ellipse rx="200" ry="75"/>
    <ellipse rx="200" ry="75" transform="rotate(60)"/>
    <ellipse rx="200" ry="75" transform="rotate(120)"/>
  </g>
  
  <!-- Electrons (3 yellow dots) -->
  <circle cx="456" cy="256" r="16" fill="#fbbf24"/>
  <circle cx="156" cy="89" r="16" fill="#fbbf24"/>
  <circle cx="156" cy="423" r="16" fill="#fbbf24"/>
  
  <!-- "L" letter at center -->
  <text x="256" y="305" 
        text-anchor="middle" 
        font-size="180" 
        font-weight="700" 
        fill="white" 
        font-family="Inter, system-ui, sans-serif">L</text>
</svg>
